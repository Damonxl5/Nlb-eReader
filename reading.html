        <p class="reading-content text-base text-gray-800 mb-5">1965年8月9日，新加坡脱离马来西亚联邦，成为独立的主权国家。这一刻，没有欢呼，只有忧虑——一个没有腹地、缺乏资源的弹丸小国，能否在强邻环伺中生存下去？</p>
